  <text x="20" y="154" font-family="JetBrains Mono, monospace" font-size="13" fill="#8b949e">  [<tspan fill="#58a6ff">LOADING</tspan>]  RAG pipeline — building long-term memory layer</text>
  <text x="20" y="174" font-family="JetBrains Mono, monospace" font-size="13" fill="#8b949e">  [<tspan fill="#d29922">STANDBY</tspan>]  LoRA fine-tune — custom model experiments</text>
  <text x="20" y="194" font-family="JetBrains Mono, monospace" font-size="13" fill="#8b949e">  [<tspan fill="#8B5CF6">SHIPPED</tspan>]  Invoice system — offline HTML tool for Shopline</text>
  <text x="20" y="214" font-family="JetBrains Mono, monospace" font-size="13" fill="#8b949e">  [<tspan fill="#f78166">LEARNING</tspan>] Solidity — smart contracts &amp; on-chain logic</text>

